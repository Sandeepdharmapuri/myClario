# Enable Spark Reporter
extent.reporter.spark.start=true
extent.reporter.spark.out=test-output/SparkReport/automation-test-report.html
extent.reporter.spark.config=src/test/resources/spark-config.xml
extent.reporter.spark.base64imagesrc=true
extent.reporter.spark.vieworder=dashboard,test,category,exception,author,device,log

# Screenshot configuration
extent.reporter.spark.screenshot.dir=test-output/Screenshots
extent.reporter.spark.screenshot.rel.path=../Screenshots
extent.reporter.spark.thumbnailForBase64=true

# Enable Excel Reporter
extent.reporter.excel.start=true
extent.reporter.excel.out=test-output/ExcelReport/ExtentExcel.xlsx

# Enable PDF Reporter
extent.reporter.pdf.start=true
extent.reporter.pdf.out=test-output/PdfReport/ExtentPdf.pdf

# Base folder configuration
basefolder.name=test-reports
basefolder.datetimepattern=d-MMM-yy HH-mm-ss

# System info
systeminfo.os=Windows
systeminfo.Engineer=Sandeep Kumar || Manoj Kumar Behera
systeminfo.project=MyClario Test Automation
systeminfo.Browser=Chrome

# Additional system info
systeminfo.environment=QA
systeminfo.buildVersion=1.0.0
systeminfo.javaVersion=JAVASE-1.8

# Custom CSS and JS for Spark report
extent.reporter.spark.customcss=src/test/resources/custom.css
extent.reporter.spark.customjs=src/test/resources/custom.js

# Filters for Spark report
extent.reporter.spark.filter.status.pass=true
extent.reporter.spark.filter.status.fail=true
extent.reporter.spark.filter.status.skip=true
extent.reporter.spark.filter.status.warning=true

# Custom logs order
extent.reporter.spark.logorder=timestamp,level,details
